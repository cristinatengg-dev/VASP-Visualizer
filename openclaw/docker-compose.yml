version: "3.8"

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "0.0.0.0:18789:18789"
      - "0.0.0.0:18791:18791"
    user: "0:0"
    environment:
      - OPENAI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_BASE=https://api.aipaibox.com/v1
      - OPENAI_MODEL=gemini-2.5-flash
    volumes:
      - ./config:/app/config
      - ./workspace:/app/workspace
      - ./logs:/app/logs
      - openclaw-data:/root/.openclaw
    tmpfs:
      - /tmp:size=256m
    working_dir: /app

  gewe:
    image: registry.cn-hangzhou.aliyuncs.com/gewe/gewe:latest
    container_name: gewe
    restart: unless-stopped
    ports:
      - "2531:2531"
      - "2532:2532"
    volumes:
      - ./gewe-data:/root/temp

volumes:
  openclaw-data:
