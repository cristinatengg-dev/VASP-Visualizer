version: "3.8"

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    network_mode: host
    user: "0:0"
    environment:
      - OPENAI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_BASE=https://api.aipaibox.com/v1
      - OPENAI_MODEL=gemini-2.5-flash
    volumes:
      - ./workspace:/app/workspace
      - ./logs:/app/logs
    tmpfs:
      - /tmp:size=256m
    working_dir: /app

  gewe:
    image: registry.cn-hangzhou.aliyuncs.com/gewe/gewe:latest
    container_name: gewe
    restart: unless-stopped
    ports:
      - "2531:2531"
      - "2532:2532"
    volumes:
      - ./gewe-data:/root/temp

  # Forwards 0.0.0.0:18789 → host 127.0.0.1:18789 (OpenClaw binds to localhost only)
  openclaw-proxy:
    image: alpine/socat
    container_name: openclaw-proxy
    restart: unless-stopped
    network_mode: host
    command: TCP-LISTEN:28789,fork,reuseaddr TCP:127.0.0.1:18789
    depends_on:
      - openclaw
